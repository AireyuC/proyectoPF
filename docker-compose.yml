services:
  db_pfix:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    restart: always

  backend_pfix:
    build: ./phone-fix-backend
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./phone-fix-backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./phone-fix-backend/.env
    depends_on:
      - db_pfix
    restart: always

  frontend_pfix:
    build: ./phone-fix-frontend
    volumes:
      - ./phone-fix-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend_pfix
    restart: always

volumes:
  postgres_data:
